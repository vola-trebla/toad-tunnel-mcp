services:
  postgres:
    image: postgres:16-alpine
    container_name: toad-tunnel-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: toad
      POSTGRES_PASSWORD: toad_secret
      POSTGRES_DB: postgres
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toad -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
